<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Akinnova | Dealer del Futuro</title>
    <!-- Fuente Poppins (Google Fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;   /* fondo blanco general, la sección principal será igual */
        }

        /* contenedor principal: asegura que la imagen ocupe todo el ancho y posición relativa para la barra superpuesta */
        .hero {
            position: relative;
            width: 100%;
            /* la imagen de fondo ocupará todo el ancho con altura definida, pero usaremos img para mantener la relación y cubrir */
        }

        /* imagen que ocupa todo el ancho de la hoja (exactamente como en el PDF: imagen real a ancho completo) */
        .hero-image {
            width: 100%;
            display: block;
            height: auto;
            /* la imagen mantiene su proporción, ocupando 100% del ancho. Si se desea un alto fijo podría usarse, pero PDF sugiere ancho completo */
        }

        /* barra blanca flotante sobre la imagen: esquinas redondeadas, no ocupa todo el ancho, posicionada encima */
        .navbar-overlay {
            position: absolute;
            top: 30px;          /* separación desde arriba, como en boceto */
            left: 5%;
            right: 5%;
            width: 90%;         /* para que no llegue a bordes, esquinas redondeadas */
            background-color: #ffffff;
            border-radius: 60px;   /* esquinas muy redondeadas, estilo barra moderna */
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(0px); /* sólido blanco, sin transparencia */
            z-index: 20;
            transition: all 0.2s ease;
        }

        /* logo dentro de la barra */
        .logo-img {
            height: 48px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        /* texto "Siempre Nuevo" con color azul exacto #0c3a6a */
        .siempre-nuevo {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: -0.3px;
            color: #0c3a6a;
            margin: 0;
            line-height: 1.2;
        }

        /* contenedor del texto principal (sobre la imagen, arriba del carro) */
        .hero-text {
            position: absolute;
            top: 40%;            /* centrado verticalmente según boceto, pero flexible con media queries */
            left: 0;
            right: 0;
            text-align: center;
            z-index: 15;
            transform: translateY(-50%);
            padding: 0 20px;
        }

        .hero-text h1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 3.8rem;
            line-height: 1.2;
            color: white;
            text-shadow: 4px 4px 12px rgba(0, 0, 0, 0.6), 2px 2px 4px rgba(0, 0, 0, 0.4);
            margin: 0;
            letter-spacing: -0.02em;
        }

        /* línea debajo de la imagen: texto descriptivo centrado, color negro */
        .description-section {
            max-width: 1100px;
            margin: 60px auto 80px auto;
            padding: 0 24px;
            text-align: center;
        }

        .description-text {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 500;
            color: #000000;        /* negro puro */
            line-height: 1.4;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* para asegurar que en móviles el texto del h1 no se desborde */
        @media (max-width: 768px) {
            .navbar-overlay {
                padding: 12px 24px;
                top: 20px;
                width: 90%;
                left: 5%;
                right: 5%;
            }
            .logo-img {
                height: 36px;
            }
            .siempre-nuevo {
                font-size: 1.2rem;
                font-weight: 600;
            }
            .hero-text h1 {
                font-size: 2rem;
                text-shadow: 3px 3px 8px rgba(0,0,0,0.7);
            }
            .hero-text {
                top: 45%;
            }
            .description-text {
                font-size: 1.2rem;
            }
            .description-section {
                margin: 40px auto 50px auto;
            }
        }

        @media (max-width: 480px) {
            .navbar-overlay {
                padding: 10px 20px;
            }
            .logo-img {
                height: 30px;
            }
            .siempre-nuevo {
                font-size: 1rem;
            }
            .hero-text h1 {
                font-size: 1.6rem;
            }
            .description-text {
                font-size: 1rem;
            }
        }

        /* para pantallas muy grandes, ajustar tamaño texto */
        @media (min-width: 1400px) {
            .hero-text h1 {
                font-size: 5rem;
            }
            .description-text {
                font-size: 1.8rem;
            }
        }

        /* opcional: asegurar que el contenedor hero tenga pos relativa */
        .hero {
            position: relative;
        }

        /* pequeño detalle de foco para evitar desbordes */
        img {
            max-width: 100%;
        }
    </style>
</head>
<body>

<section class="hero">
    <!-- imagen del carro a ancho completo: carro-inicio.png -->
    <img class="hero-image" src="fotos/carro-inicio.png" alt="Vehículo principal | Akinnova">

    <!-- barra blanca con esquinas redondeadas: logo a la izquierda, Siempre Nuevo en azul a la derecha -->
    <div class="navbar-overlay">
        <img class="logo-img" src="fotos/akinnova-logo.png" alt="Akinnova Logo">
        <span class="siempre-nuevo">Siempre Nuevo</span>
    </div>

    <!-- Texto "Impulsando el Dealer del Futuro" centrado, blanco con sombra -->
    <div class="hero-text">
        <h1>Impulsando el<br>Dealer del Futuro</h1>
    </div>
</section>

<!-- sección debajo de la imagen: frase descriptiva centrada en negro -->
<div class="description-section">
    <p class="description-text">
        Conectamos visión, innovación y talento para transformar el concesionario en un ecosistema ágil, rentable y centrado en el cliente.
    </p>
</div>

<!-- Se añade un pequeño espacio para que respire el contenido, como solicita primera etapa -->
<!-- No se incluye más contenido por ahora, solo lo pedido: barra, imagen full width, textos -->

</body>
</html>
