<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Akinnova | Dealer del Futuro</title>
    <!-- Fuente Poppins (Google Fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
        }

        /* contenedor hero: imagen a ancho completo */
        .hero {
            position: relative;
            width: 100%;
        }

        /* imagen que ocupa todo el ancho de la hoja */
        .hero-image {
            width: 100%;
            display: block;
            height: auto;
        }

        /* barra blanca con esquinas redondeadas 
           - EL DOBLE DE LARGA: antes width 94%, ahora width 98% (prácticamente bordes laterales mínimos)
           - LA MITAD DE ANCHA: reducimos padding vertical de 12px a 6px (mitad de alto visual)
           - Más abajo se mantiene top:70px pero se puede ajustar
        */
        .navbar-overlay {
            position: absolute;
            top: 70px;              /* mantiene separación superior */
            left: 1%;              /* más cerca del borde para hacerla más larga */
            right: 1%;
            width: 98%;            /* el doble de larga en términos horizontales: casi el ancho total */
            background-color: #ffffff;
            border-radius: 60px;
            padding: 6px 40px;     /* LA MITAD DE ANCHA: antes 12px vertical, ahora 6px vertical */
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            z-index: 20;
            transition: all 0.2s ease;
        }

        /* logo dentro de la barra */
        .logo-img {
            height: 52px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        /* texto "Siempre Nuevo" con color azul exacto #0c3a6a y letras grandes */
        .siempre-nuevo {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.2px;
            color: #0c3a6a;
            margin: 0;
            line-height: 1.2;
        }

        /* contenedor del texto principal sobre la imagen - MÁS ARRIBA */
        .hero-text {
            position: absolute;
            top: 28%;               /* antes 48%, ahora más arriba (28%) para que suba el título */
            left: 0;
            right: 0;
            text-align: center;
            z-index: 15;
            transform: translateY(-50%);
            padding: 0 20px;
        }

        /* Título principal: Impulsando el Dealer del Futuro - CON ITÁLICA (cursiva) y letras grandes */
        .hero-text h1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 5rem;
            line-height: 1.2;
            color: white;
            text-shadow: 5px 5px 14px rgba(0, 0, 0, 0.7), 3px 3px 6px rgba(0, 0, 0, 0.5);
            margin: 0;
            letter-spacing: -0.02em;
            font-style: italic;      /* ITÁLICA agregada */
        }

        /* línea debajo de la imagen: texto descriptivo centrado, color negro, MÁS GRANDE */
        .description-section {
            max-width: 1300px;
            margin: 70px auto 90px auto;
            padding: 0 24px;
            text-align: center;
        }

        .description-text {
            font-family: 'Poppins', sans-serif;
            font-size: 2.2rem;      /* MÁS GRANDE: antes 1.8rem, ahora 2.2rem */
            font-weight: 500;
            color: #000000;
            line-height: 1.45;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* responsive: ajustamos tamaños para pantallas medianas y pequeñas manteniendo proporciones */
        @media (max-width: 1200px) {
            .description-text {
                font-size: 1.8rem;
            }
            .hero-text h1 {
                font-size: 4.2rem;
            }
            .siempre-nuevo {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 1024px) {
            .navbar-overlay {
                top: 50px;
                padding: 5px 32px;   /* mantener mitad de ancha en responsive */
                width: 96%;
                left: 2%;
                right: 2%;
            }
            .logo-img {
                height: 44px;
            }
            .siempre-nuevo {
                font-size: 1.6rem;
            }
            .hero-text h1 {
                font-size: 3.5rem;
                font-style: italic;
            }
            .hero-text {
                top: 26%;
            }
            .description-text {
                font-size: 1.6rem;
            }
        }

        @media (max-width: 768px) {
            .navbar-overlay {
                top: 40px;
                padding: 4px 24px;
                width: 96%;
                left: 2%;
                right: 2%;
                border-radius: 50px;
            }
            .logo-img {
                height: 36px;
            }
            .siempre-nuevo {
                font-size: 1.3rem;
                font-weight: 700;
            }
            .hero-text h1 {
                font-size: 2.5rem;
                font-style: italic;
            }
            .hero-text {
                top: 22%;
            }
            .description-text {
                font-size: 1.3rem;
            }
            .description-section {
                margin: 50px auto 60px auto;
            }
        }

        @media (max-width: 550px) {
            .navbar-overlay {
                top: 30px;
                padding: 3px 18px;
                border-radius: 40px;
            }
            .logo-img {
                height: 28px;
            }
            .siempre-nuevo {
                font-size: 1rem;
            }
            .hero-text h1 {
                font-size: 1.8rem;
                font-style: italic;
            }
            .hero-text {
                top: 20%;
            }
            .description-text {
                font-size: 1.1rem;
            }
        }

        /* Para pantallas muy grandes (desktop wide), escalamos aún más */
        @media (min-width: 1600px) {
            .hero-text h1 {
                font-size: 6rem;
                font-style: italic;
            }
            .siempre-nuevo {
                font-size: 2.3rem;
            }
            .logo-img {
                height: 64px;
            }
            .navbar-overlay {
                padding: 7px 56px;    /* mantiene mitad de ancha: antes 6px, ahora 7px sutíl */
                top: 85px;
                width: 98%;
                left: 1%;
                right: 1%;
            }
            .description-text {
                font-size: 2.4rem;
            }
            .hero-text {
                top: 28%;
            }
        }

        @media (min-width: 2000px) {
            .hero-text h1 {
                font-size: 7rem;
            }
            .description-text {
                font-size: 2.6rem;
            }
            .hero-text {
                top: 30%;
            }
        }

        .hero {
            position: relative;
        }

        img {
            max-width: 100%;
        }
    </style>
</head>
<body>

<section class="hero">
    <!-- imagen del carro a ancho completo: carro-inicio.png desde carpeta fotos -->
    <img class="hero-image" src="fotos/carro-inicio.png" alt="Vehículo principal | Akinnova">

    <!-- barra blanca: EL DOBLE DE LARGA (width 98%, casi toda la pantalla) y LA MITAD DE ANCHA (padding vertical 6px) -->
    <div class="navbar-overlay">
        <img class="logo-img" src="fotos/akinnova-logo.png" alt="Akinnova Logo">
        <span class="siempre-nuevo">Siempre Nuevo</span>
    </div>

    <!-- Texto principal con itálica (cursiva) y más arriba (top:28% en lugar de 48%) -->
    <div class="hero-text">
        <h1>Impulsando el<br>Dealer del Futuro</h1>
    </div>
</section>

<!-- Frase debajo de la imagen: letras MÁS GRANDES (2.2rem de base, responsive crece) -->
<div class="description-section">
    <p class="description-text">
        Conectamos visión, innovación y talento para transformar el concesionario en un ecosistema ágil, rentable y centrado en el cliente.
    </p>
</div>

</body>
</html>
