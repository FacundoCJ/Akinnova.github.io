<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Akinnova | Dealer del Futuro</title>
    <!-- Fuente Poppins (Google Fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
        }

        /* contenedor hero: imagen a ancho completo */
        .hero {
            position: relative;
            width: 100%;
        }

        /* imagen que ocupa todo el ancho de la hoja */
        .hero-image {
            width: 100%;
            display: block;
            height: auto;
        }

        /* barra blanca con esquinas redondeadas - MÁS LARGA (mayor ancho), MENOS ANCHA (menos padding vertical), y más abajo (top mayor) */
        .navbar-overlay {
            position: absolute;
            top: 70px;              /* más abajo que antes (antes 30px) */
            left: 3%;
            right: 3%;
            width: 94%;             /* más ancha, ocupa casi todo el ancho pero con esquinas redondeadas */
            background-color: #ffffff;
            border-radius: 60px;
            padding: 12px 40px;     /* menos ancho: reducimos padding vertical de 16px a 12px, horizontal aumentado para dar sensación de barra estilizada */
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            z-index: 20;
            transition: all 0.2s ease;
        }

        /* logo dentro de la barra */
        .logo-img {
            height: 52px;           /* ligeramente más grande para acompañar letras grandes */
            width: auto;
            display: block;
            object-fit: contain;
        }

        /* texto "Siempre Nuevo" con color azul exacto #0c3a6a y LETRAS MÁS GRANDES */
        .siempre-nuevo {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 2rem;        /* letras más grandes (antes 1.6rem) */
            letter-spacing: -0.2px;
            color: #0c3a6a;
            margin: 0;
            line-height: 1.2;
        }

        /* contenedor del texto principal sobre la imagen */
        .hero-text {
            position: absolute;
            top: 48%;               /* ajustado para mejor visual con barra más abajo */
            left: 0;
            right: 0;
            text-align: center;
            z-index: 15;
            transform: translateY(-50%);
            padding: 0 20px;
        }

        /* Título principal: Impulsando el Dealer del Futuro - LETRAS MÁS GRANDES */
        .hero-text h1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 5rem;        /* letras mucho más grandes (antes 3.8rem) */
            line-height: 1.2;
            color: white;
            text-shadow: 5px 5px 14px rgba(0, 0, 0, 0.7), 3px 3px 6px rgba(0, 0, 0, 0.5);
            margin: 0;
            letter-spacing: -0.02em;
        }

        /* línea debajo de la imagen: texto descriptivo centrado, color negro, también letra más grande */
        .description-section {
            max-width: 1200px;
            margin: 70px auto 90px auto;
            padding: 0 24px;
            text-align: center;
        }

        .description-text {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;      /* texto descriptivo más grande para coherencia */
            font-weight: 500;
            color: #000000;
            line-height: 1.4;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* responsive: ajustamos tamaños para pantallas medianas y pequeñas manteniendo proporción */
        @media (max-width: 1024px) {
            .navbar-overlay {
                top: 50px;
                padding: 10px 32px;
            }
            .logo-img {
                height: 44px;
            }
            .siempre-nuevo {
                font-size: 1.6rem;
            }
            .hero-text h1 {
                font-size: 3.8rem;
            }
            .description-text {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .navbar-overlay {
                top: 40px;
                padding: 8px 24px;
                width: 92%;
                left: 4%;
                right: 4%;
            }
            .logo-img {
                height: 36px;
            }
            .siempre-nuevo {
                font-size: 1.3rem;
                font-weight: 700;
            }
            .hero-text h1 {
                font-size: 2.4rem;
                text-shadow: 3px 3px 8px rgba(0,0,0,0.7);
            }
            .hero-text {
                top: 45%;
            }
            .description-text {
                font-size: 1.2rem;
            }
            .description-section {
                margin: 50px auto 60px auto;
            }
        }

        @media (max-width: 550px) {
            .navbar-overlay {
                top: 30px;
                padding: 6px 20px;
                border-radius: 40px;
            }
            .logo-img {
                height: 28px;
            }
            .siempre-nuevo {
                font-size: 1rem;
            }
            .hero-text h1 {
                font-size: 1.8rem;
            }
            .description-text {
                font-size: 1rem;
            }
        }

        /* Para pantallas muy grandes (desktop wide), escalamos aún más */
        @media (min-width: 1600px) {
            .hero-text h1 {
                font-size: 6rem;
            }
            .siempre-nuevo {
                font-size: 2.3rem;
            }
            .logo-img {
                height: 64px;
            }
            .navbar-overlay {
                padding: 14px 56px;
                top: 90px;
            }
            .description-text {
                font-size: 2rem;
            }
        }

        /* opcional: asegurar que el contenedor hero tenga pos relativa */
        .hero {
            position: relative;
        }

        img {
            max-width: 100%;
        }
    </style>
</head>
<body>

<section class="hero">
    <!-- imagen del carro a ancho completo: carro-inicio.png desde carpeta fotos -->
    <img class="hero-image" src="fotos/carro-inicio.png" alt="Vehículo principal | Akinnova">

    <!-- barra blanca: MÁS LARGA (ocupa 94% del ancho), MENOS ANCHA (padding vertical reducido), más abajo (top:70px) -->
    <div class="navbar-overlay">
        <img class="logo-img" src="fotos/akinnova-logo.png" alt="Akinnova Logo">
        <span class="siempre-nuevo">Siempre Nuevo</span>
    </div>

    <!-- Texto principal con letras más grandes -->
    <div class="hero-text">
        <h1>Impulsando el<br>Dealer del Futuro</h1>
    </div>
</section>

<!-- Frase debajo de la imagen, centrada y color negro, también con tipografía más grande -->
<div class="description-section">
    <p class="description-text">
        Conectamos visión, innovación y talento para transformar el concesionario en un ecosistema ágil, rentable y centrado en el cliente.
    </p>
</div>

</body>
</html>
