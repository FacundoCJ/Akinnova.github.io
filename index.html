<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Akinnova | Dealer del Futuro</title>
    <!-- Fuente Poppins (Google Fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- FAVICON: akinnova-logo como logo de pestaña -->
    <link rel="icon" type="image/png" href="fotos/akinnova-logo.png">
    <link rel="shortcut icon" type="image/png" href="fotos/akinnova-logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
        }

        /* contenedor hero: imagen a ancho completo */
        .hero {
            position: relative;
            width: 100%;
        }

        /* imagen que ocupa todo el ancho de la hoja */
        .hero-image {
            width: 100%;
            display: block;
            height: auto;
        }

        /* 
            BARRA:
            - el doble de ancha = más padding vertical (antes 12px, ahora 24px)
            - la mitad de larga = ancho reducido a la mitad del ancho anterior
              antes width: 94% → ahora width: 47% (la mitad de larga)
              y centrada horizontalmente con left: 50% transform translateX
        */
        .navbar-overlay {
            position: absolute;
            top: 70px;                  /* mantiene posición más abajo */
            left: 50%;
            transform: translateX(-50%); /* centrado horizontal */
            width: 47%;                 /* la mitad de larga (antes 94% ≈ la mitad) */
            background-color: #ffffff;
            border-radius: 60px;
            padding: 24px 40px;         /* el doble de ancha: padding vertical 24px (antes 12px) */
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            z-index: 20;
            transition: all 0.2s ease;
        }

        /* logo dentro de la barra */
        .logo-img {
            height: 52px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        /* texto "Siempre Nuevo" con color azul #0c3a6a y letras grandes */
        .siempre-nuevo {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.2px;
            color: #0c3a6a;
            margin: 0;
            line-height: 1.2;
        }

        /* contenedor del texto principal sobre la imagen - MÁS ARRIBA */
        .hero-text {
            position: absolute;
            top: 28%;                   /* subimos más (antes 48%) para que quede más arriba */
            left: 0;
            right: 0;
            text-align: center;
            z-index: 15;
            transform: translateY(-50%);
            padding: 0 20px;
        }

        /* Título principal: Impulsando el Dealer del Futuro - con CURSIVA (itálica) y más arriba */
        .hero-text h1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 5rem;
            line-height: 1.2;
            color: white;
            text-shadow: 5px 5px 14px rgba(0, 0, 0, 0.7), 3px 3px 6px rgba(0, 0, 0, 0.5);
            margin: 0;
            letter-spacing: -0.02em;
            font-style: italic;          /* ITÁLICA / CURSIVA */
        }

        /* línea debajo de la imagen: texto descriptivo centrado, color negro, MÁS GRANDE */
        .description-section {
            max-width: 1300px;
            margin: 70px auto 90px auto;
            padding: 0 24px;
            text-align: center;
        }

        .description-text {
            font-family: 'Poppins', sans-serif;
            font-size: 2.2rem;          /* más grande (antes 1.8rem) */
            font-weight: 500;
            color: #000000;
            line-height: 1.4;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* responsive: ajustes para pantallas medianas y pequeñas manteniendo proporciones */
        @media (max-width: 1200px) {
            .navbar-overlay {
                width: 55%;              /* en pantallas medianas un poco más ancha pero manteniendo concepto mitad larga */
                padding: 22px 36px;
            }
            .hero-text h1 {
                font-size: 4.2rem;
            }
            .description-text {
                font-size: 1.9rem;
            }
        }

        @media (max-width: 992px) {
            .navbar-overlay {
                width: 65%;
                padding: 20px 32px;
                top: 60px;
            }
            .logo-img {
                height: 44px;
            }
            .siempre-nuevo {
                font-size: 1.6rem;
            }
            .hero-text {
                top: 25%;               /* ajuste para mantener arriba en pantallas medianas */
            }
            .hero-text h1 {
                font-size: 3.5rem;
            }
            .description-text {
                font-size: 1.7rem;
            }
        }

        @media (max-width: 768px) {
            .navbar-overlay {
                width: 75%;
                padding: 16px 28px;
                top: 50px;
                border-radius: 50px;
            }
            .logo-img {
                height: 36px;
            }
            .siempre-nuevo {
                font-size: 1.3rem;
            }
            .hero-text {
                top: 22%;
            }
            .hero-text h1 {
                font-size: 2.6rem;
                text-shadow: 3px 3px 8px rgba(0,0,0,0.7);
            }
            .description-text {
                font-size: 1.4rem;
            }
            .description-section {
                margin: 50px auto 60px auto;
            }
        }

        @media (max-width: 550px) {
            .navbar-overlay {
                width: 85%;
                padding: 12px 20px;
                top: 35px;
                border-radius: 40px;
            }
            .logo-img {
                height: 28px;
            }
            .siempre-nuevo {
                font-size: 1rem;
            }
            .hero-text {
                top: 18%;
            }
            .hero-text h1 {
                font-size: 1.8rem;
            }
            .description-text {
                font-size: 1.1rem;
            }
        }

        /* Para pantallas muy grandes (desktop wide) */
        @media (min-width: 1600px) {
            .navbar-overlay {
                width: 45%;             /* mantiene mitad de larga en pantallas enormes */
                padding: 28px 52px;
                top: 90px;
            }
            .logo-img {
                height: 64px;
            }
            .siempre-nuevo {
                font-size: 2.3rem;
            }
            .hero-text h1 {
                font-size: 6rem;
            }
            .hero-text {
                top: 30%;               /* ligeramente más arriba también en ultra wide */
            }
            .description-text {
                font-size: 2.4rem;
            }
        }

        .hero {
            position: relative;
        }

        img {
            max-width: 100%;
        }
    </style>
</head>
<body>

<section class="hero">
    <!-- imagen del carro a ancho completo desde carpeta fotos -->
    <img class="hero-image" src="fotos/carro-inicio.png" alt="Vehículo principal | Akinnova">

    <!-- BARRA: el doble de ancha (padding vertical 24px), la mitad de larga (width:47% centrada) -->
    <div class="navbar-overlay">
        <img class="logo-img" src="fotos/akinnova-logo.png" alt="Akinnova Logo">
        <span class="siempre-nuevo">Siempre Nuevo</span>
    </div>

    <!-- Texto principal MÁS ARRIBA y con ITÁLICA (cursiva) -->
    <div class="hero-text">
        <h1>Impulsando el<br>Dealer del Futuro</h1>
    </div>
</section>

<!-- Frase debajo de la imagen, MÁS GRANDE, centrada, color negro -->
<div class="description-section">
    <p class="description-text">
        Conectamos visión, innovación y talento para transformar el concesionario en un ecosistema ágil, rentable y centrado en el cliente.
    </p>
</div>

</body>
</html>
