<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Siempre Nuevo | Akinnova</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background-image: url('fotos/carro.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .main-container {
            padding: 2rem 2rem 0 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* BARRA SUPERIOR - TAMAÑO AUMENTADO */
        .navbar {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(2px);
            border-radius: 60px;
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            margin-top: 1.5rem;
            margin-bottom: 0;
        }

        .menu-icon {
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .menu-icon:hover {
            transform: scale(1.02);
        }
        .menu-icon img {
            width: 72px;  /* EL DOBLE: antes 36px, ahora 72px */
            height: auto;
            display: block;
        }

        .logo-icon {
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .logo-icon:hover {
            transform: scale(1.02);
        }
        .logo-icon img {
            height: 96px;  /* EL DOBLE: antes 48px, ahora 96px */
            width: auto;
            display: block;
        }

        @media (max-width: 650px) {
            .main-container {
                padding: 1rem 1rem 0 1rem;
            }
            .navbar {
                padding: 0.8rem 1.5rem;
                margin-top: 1rem;
            }
            .menu-icon img {
                width: 54px;  /* Ajuste proporcional para móvil */
            }
            .logo-icon img {
                height: 72px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Barra superior: transparente 80%, bordes redondos, separada del inicio -->
        <div class="navbar">
            <!-- Menu izquierda: imagen menu.png (doble tamaño) -->
            <div class="menu-icon" id="menuButton" role="button" aria-label="Menú principal">
                <img src="fotos/menu.png" alt="Menú">
            </div>
            <!-- Logo derecha: imagen logo-sn.png (doble tamaño) -->
            <div class="logo-icon" id="logoButton" role="button" aria-label="Logo Siempre Nuevo">
                <img src="fotos/logo-sn.png" alt="Siempre Nuevo">
            </div>
        </div>
    </div>

    <script>
        (function() {
            const menuBtn = document.getElementById('menuButton');
            const logoBtn = document.getElementById('logoButton');
            
            if (menuBtn) {
                menuBtn.addEventListener('click', function(e) {
                    alert("🚗 Menú Siempre Nuevo\n\n• Beneficios\n• Planes\n• Quienes Somos\n• ¿Por qué Siempre Nuevo?\n• Términos y Condiciones\n• Libro de Reclamaciones\n• Nuestros Aliados");
                });
            }
            
            if (logoBtn) {
                logoBtn.addEventListener('click', function() {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }
        })();
    </script>
</body>
</html>
