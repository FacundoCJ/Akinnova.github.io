<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Siempre Nuevo | Akinnova</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            background-image: url('fotos/carro.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .main-container {
            padding: 2rem 2rem 0 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .navbar {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(2px);
            border-radius: 60px;
            padding: 0.7rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            margin-top: 1.5rem;
            margin-bottom: 2rem;
        }

        .menu-icon {
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .menu-icon:hover {
            transform: scale(1.02);
        }
        .menu-icon img {
            width: 60px;
            height: auto;
            display: block;
        }

        .logo-icon {
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .logo-icon:hover {
            transform: scale(1.02);
        }
        .logo-icon img {
            height: 96px;
            width: auto;
            display: block;
        }

        .content-section {
            background-color: #0c3a6a;
            border-radius: 40px;
            padding: 3rem;
            margin-top: 1rem;
            display: flex;
            gap: 3rem;
            flex-wrap: wrap;
        }

        .form-container {
            flex: 1;
            min-width: 280px;
            background-color: #e7f3ff;
            border-radius: 32px;
            padding: 2rem;
        }

        .form-container h2 {
            color: #0c3a6a;
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #0c3a6a;
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            background-color: white;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff914d;
            box-shadow: 0 0 0 3px rgba(255, 145, 77, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn-continuar {
            background-color: #ff914d;
            color: #0c3a6a;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
        }

        .btn-continuar:hover:not(:disabled) {
            transform: scale(1.02);
            background-color: #ff7a2e;
        }

        .btn-continuar.success {
            background-color: #28a745;
            color: white;
        }

        .btn-continuar.error {
            background-color: #dc3545;
            color: white;
        }

        .btn-continuar:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .video-container {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .video-wrapper {
            background-color: transparent;
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            max-height: 500px;
        }

        .video-wrapper video {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 500px;
            object-fit: contain;
            border-radius: 32px;
        }

        .social-section {
            text-align: center;
            padding: 0.5rem;
        }

        .social-section p {
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .social-icons a {
            display: inline-block;
            transition: transform 0.2s ease;
        }

        .social-icons a:hover {
            transform: scale(1.1);
        }

        .social-icons img {
            width: 48px;
            height: 48px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 1rem 1rem 0 1rem;
            }
            .navbar {
                padding: 0.5rem 1.5rem;
                margin-top: 1rem;
            }
            .menu-icon img {
                width: 45px;
            }
            .logo-icon img {
                height: 72px;
            }
            .content-section {
                padding: 1.5rem;
                gap: 1.5rem;
            }
            .form-container {
                padding: 1.5rem;
            }
            .form-container h2 {
                font-size: 1.4rem;
            }
            .social-icons img {
                width: 40px;
                height: 40px;
            }
            .video-wrapper video {
                max-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="navbar">
            <div class="menu-icon" id="menuButton">
                <img src="fotos/menu.png" alt="Menú">
            </div>
            <div class="logo-icon" id="logoButton">
                <img src="fotos/logo-sn.png" alt="Siempre Nuevo">
            </div>
        </div>

        <div class="content-section">
            <div class="form-container">
                <h2>Te contamos cómo proteger tu auto</h2>
                <form id="contactForm">
                    <div class="form-group">
                        <label>Nombre y Apellidos</label>
                        <input type="text" name="nombre" required placeholder="Ej: Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label>Correo</label>
                        <input type="email" name="email" required placeholder="ejemplo@correo.com">
                    </div>
                    <div class="form-group">
                        <label>Número de teléfono / WhatsApp</label>
                        <input type="tel" name="telefono" required placeholder="+51 999 999 999">
                    </div>
                    <div class="form-group">
                        <label>Comentario (Opcional)</label>
                        <textarea name="comentario" placeholder="Escribe aquí tu mensaje..."></textarea>
                    </div>
                    <button type="submit" class="btn-continuar" id="submitBtn">Continuar</button>
                </form>
            </div>

            <div class="video-container">
                <div class="video-wrapper">
                    <video id="mainVideo" controls>
                        <source src="fotos/video1.mp4" type="video/mp4">
                        Tu navegador no soporta el elemento de video.
                    </video>
                </div>
                <div class="social-section">
                    <p>Síguenos en nuestras redes</p>
                    <div class="social-icons">
                        <a href="https://www.instagram.com/siemprenuevo.pe/" target="_blank">
                            <img src="fotos/instagram.png" alt="Instagram">
                        </a>
                        <a href="https://www.tiktok.com/@siemprenuevo.pe" target="_blank">
                            <img src="fotos/tiktok.png" alt="TikTok">
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const menuBtn = document.getElementById('menuButton');
            const logoBtn = document.getElementById('logoButton');
            const form = document.getElementById('contactForm');
            const submitBtn = document.getElementById('submitBtn');
            
            if (menuBtn) {
                menuBtn.addEventListener('click', function() {
                    alert("🚗 Menú Siempre Nuevo\n\n• Beneficios\n• Planes\n• Quienes Somos\n• ¿Por qué Siempre Nuevo?\n• Términos y Condiciones\n• Libro de Reclamaciones\n• Nuestros Aliados");
                });
            }
            
            if (logoBtn) {
                logoBtn.addEventListener('click', function() {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }

            // Función para enviar el formulario
            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    // Deshabilitar botón y mostrar loading
                    submitBtn.innerHTML = '<span class="spinner"></span> Enviando...';
                    submitBtn.disabled = true;
                    submitBtn.classList.remove('success', 'error');
                    
                    // Obtener datos del formulario
                    const nombre = form.querySelector('input[name="nombre"]').value;
                    const email = form.querySelector('input[name="email"]').value;
                    const telefono = form.querySelector('input[name="telefono"]').value;
                    const comentario = form.querySelector('textarea[name="comentario"]').value;
                    
                    // Crear el contenido del mensaje con formato bonito
                    const mensaje = `
🚗 NUEVO PEDIDO / CONSULTA - SIEMPRE NUEVO 🚗
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

📋 DATOS DEL CLIENTE:
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
👤 NOMBRE: ${nombre}
📧 CORREO: ${email}
📱 TELÉFONO/WHATSAPP: ${telefono}
💬 COMENTARIO: ${comentario || 'Sin comentario'}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📅 FECHA: ${new Date().toLocaleString('es-PE')}
🌐 PÁGINA: Siempre Nuevo - Akinnova
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

⚠️ Por favor contactar al cliente a la brevedad.
                    `;
                    
                    try {
                        // Usar FormSubmit.co con el email activado
                        // IMPORTANTE: Reemplaza TU_CODIGO_AQUI con el código que te dio FormSubmit después de activar
                        const response = await fetch('https://formsubmit.co/ajax/facundocordova505@gmail.com', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Accept': 'application/json'
                            },
                            body: JSON.stringify({
                                name: nombre,
                                email: email,
                                phone: telefono,
                                message: mensaje,
                                _subject: `🚗 NUEVO PEDIDO - ${nombre} ha solicitado información`,
                                _captcha: 'false',
                                _template: 'table',
                                _replyto: email
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (response.ok) {
                            // Éxito
                            submitBtn.innerHTML = '✓ ¡Enviado con éxito!';
                            submitBtn.classList.add('success');
                            form.reset();
                            
                            setTimeout(() => {
                                submitBtn.innerHTML = 'Continuar';
                                submitBtn.classList.remove('success');
                                submitBtn.disabled = false;
                            }, 3000);
                        } else {
                            throw new Error('Error al enviar');
                        }
                    } catch (error) {
                        console.error('Error:', error);
                        submitBtn.innerHTML = '❌ Error, intenta de nuevo';
                        submitBtn.classList.add('error');
                        
                        setTimeout(() => {
                            submitBtn.innerHTML = 'Continuar';
                            submitBtn.classList.remove('error');
                            submitBtn.disabled = false;
                        }, 3000);
                    }
                });
            }

            // Verificar video
            const video = document.getElementById('mainVideo');
            if (video) {
                video.addEventListener('error', function() {
                    const parent = this.parentElement;
                    const fallback = document.createElement('div');
                    fallback.textContent = '🎬 Video 1';
                    fallback.style.color = '#0c3a6a';
                    fallback.style.fontSize = '1.5rem';
                    fallback.style.fontWeight = 'bold';
                    fallback.style.display = 'flex';
                    fallback.style.alignItems = 'center';
                    fallback.style.justifyContent = 'center';
                    fallback.style.width = '100%';
                    fallback.style.height = '300px';
                    fallback.style.backgroundColor = 'transparent';
                    fallback.style.borderRadius = '32px';
                    this.style.display = 'none';
                    parent.appendChild(fallback);
                });
            }
        })();
    </script>
</body>
</html>
