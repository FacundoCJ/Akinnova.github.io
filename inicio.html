<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akinnova - Hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            font-family: 'Poppins', sans-serif;
        }

        /* Línea superior más larga (ocupa todo el ancho) */
        .top-bar {
            background-color: #c2e9ff;
            height: 12px;
            width: 100%;
        }

        /* Contenedor para la imagen y el texto */
        .hero {
            max-width: 1300px;
            margin: 0 auto;
            padding: 40px 40px;
            display: flex;
            gap: 40px;
            align-items: center;
        }

        /* Imagen a la izquierda */
        .hero-image {
            flex: 1;
        }

        .hero-image img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }

        /* Texto a la derecha */
        .hero-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center; /* Centra el texto horizontalmente */
        }

        /* Título en negrita, cursiva, centrado y color negro */
        .hero-title {
            font-size: 3rem;
            font-weight: 700; /* Negrita */
            font-style: italic; /* Cursiva */
            color: #000000; /* Negro */
            line-height: 1.2;
            margin-bottom: 20px;
        }

        /* Texto inferior en negro */
        .hero-subtitle {
            font-size: 1.2rem;
            color: #000000;
            font-weight: 400;
            max-width: 500px;
            margin: 0 auto; /* Centra el bloque de texto */
        }

        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Línea superior más larga -->
    <div class="top-bar"></div>

    <!-- Hero: imagen a la izquierda, texto a la derecha -->
    <div class="hero">
        <div class="hero-image">
            <img src="fotos/carro-inicio.png" alt="Auto" onerror="this.src='https://placehold.co/600x400/c2e9ff/004aad?text=carro-inicio.png'">
        </div>
        <div class="hero-text">
            <div class="hero-title">Impulsando el<br>Dealer del Futuro</div>
            <div class="hero-subtitle">Conectamos visión, innovación y talento para transformar el concesionario en un ecosistema ágil, rentable y centrado en el cliente.</div>
        </div>
    </div>
</body>
</html>
